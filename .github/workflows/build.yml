name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install NDK 27.0.12077973
      run: sdkmanager "ndk;27.0.12077973"

    - name: Initialize missing submodules
      run: |
        git submodule update --init --recursive || true
        if [ ! -d "quickjs/thirdparty/quickjs" ]; then
          mkdir -p quickjs/thirdparty
          git clone https://github.com/bellard/quickjs.git quickjs/thirdparty/quickjs
        fi
        if [ ! -d "app/src/main/cpp/thirdparty/webrtc_aec3" ]; then
          mkdir -p app/src/main/cpp/thirdparty
          git clone https://github.com/khomin/AEC3_cmake.git app/src/main/cpp/thirdparty/webrtc_aec3
        fi
        if [ ! -d "app/src/main/cpp/thirdparty/ncnn" ]; then
          git clone https://github.com/Tencent/ncnn.git app/src/main/cpp/thirdparty/ncnn
        fi
        if [ ! -d "app/src/main/cpp/thirdparty/sherpa-ncnn" ]; then
          git clone https://github.com/k2-fsa/sherpa-ncnn.git app/src/main/cpp/thirdparty/sherpa-ncnn
        fi

    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        echo "GITHUB_CLIENT_ID=${{ secrets.GITHUB_CLIENT_ID }}" >> local.properties

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-home-cache-cleanup: true

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace
      env:
        GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
        GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon --stacktrace
      env:
        GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
        GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
      continue-on-error: true

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/app-release.apk
      if: success()
